<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Webserv - Upload Test</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background-color: #f4f4f9; }
        .upload-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h2 { color: #333; }
        input[type="file"] { margin: 20px 0; border: 1px dashed #ccc; padding: 10px; width: 100%; border-radius: 5px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #status { margin-top: 20px; padding: 10px; border-radius: 5px; display: none; }
        .success { display: block !important; background-color: #d4edda; color: #155724; }
        .error { display: block !important; background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <div class="upload-card">
        <h2>📁 Upload de Fichier</h2>
        <p>Ce test simule un <code>curl --data-binary</code></p>
        
        <input type="file" id="filePicker">
        <br>
        <button onclick="uploadFichier()">Envoyer au Serveur</button>

        <div id="status"></div>
    </div>

    <script>
        async function uploadFichier() {
            const picker = document.getElementById('filePicker');
            const status = document.getElementById('status');
            
            if (picker.files.length === 0) {
                alert("Choisis un fichier d'abord !");
                return;
            }

            const file = picker.files[0];
            status.innerText = "Upload en cours...";
            status.className = "";
            status.style.display = "block";

            try {
                // On imite curl : POST /upload/nom_du_fichier
                // Le body est le fichier PUR (pas de multipart)
                const response = await fetch('/upload/' + file.name, {
                    method: 'POST',
                    body: file 
                });

                if (response.ok) {
                    status.innerText = "✅ Succès ! Fichier enregistré sous : " + file.name;
                    status.className = "success";
                } else {
                    status.innerText = "❌ Erreur Serveur : " + response.status;
                    status.className = "error";
                }
            } catch (err) {
                status.innerText = "❌ Erreur de connexion";
                status.className = "error";
            }
        }
    </script>
</body>
</html>
