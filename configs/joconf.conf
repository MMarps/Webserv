server {
	listen 8080;
	server_name example.com;
	root var/www;
	index index.html;
	error_page 404 var/errors/404.html;
	error_page 500 var/errors/500.html;

	location /location
	{
		autoindex on;
		cgi .py /usr/bin/python3;
		cgi .php /usr/bin/php;
	}
	location /location/autoindex {
		autoindex on;
	}
	location /location/autoindex/test {
		autoindex on;
	}
	location /location/noautoindex {
		autoindex off;
	}
	location /location/otherlocation {
	}
	location /location/image {
	}
	location /location/old {
		return 301 /new;
	}
	location /location/method {
		methods POST;
	}
}

