server {
	listen 8080;
	server_name example.com;
	root var/www;
	index index.html;
	# error_page 404 var/errors/404.html;
	client_max_body_size 1k;
	# error_page 500 var/errors/500.html;
	cgi .php /usr/bin/php-cgi;
	cgi .py /usr/bin/python3;

	location / {
		autoindex on;
	}

	location /uploads
	{
		root var;
		autoindex on;
	}

	location /upload {
		upload_store ./var/uploads;
		client_max_body_size 1000m;
	}

	location /location {
		autoindex on;
		cgi .py /usr/bin/python3;
		cgi .php /usr/bin/dfdsfdsfdsfds;
	}
	location /location/autoindex {
		autoindex on;
	}
	location /location/autoindex/test {
		autoindex on;
	}
	location /location/noautoindex {
		autoindex off;
	}
	location /location/otherlocation {
	}
	location /location/image {
	}
	location /location/old {
		return 301 /location/new;
	}
	location /location/method {
		methods POST;
	}
	location /location/403 {
		autoindex on;

	}
	location /withindex {
	}

	location /link {
		return 301 https://www.youtube.com/watch?v=dQw4w9WgXcQ;
	}
}

